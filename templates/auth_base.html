<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HuTech{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --navy: #0A192F;
            --navy-soft: #0d2038;
            --teal: #64FFDA;
            --white: #F8FAFC;
            --slate: #8892B0;
            --coral: #FF6B6B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--navy);
            color: var(--white);
            overflow-x: hidden;
        }

        #sky {
            position: fixed;
            inset: 0;
            z-index: 0;
            display: block;
        }

        .veil {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse at center, rgba(10,25,47,0.35) 0%, rgba(10,25,47,0.75) 65%, rgba(10,25,47,0.92) 100%);
            pointer-events: none;
        }

        .page {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .brand {
            position: absolute;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            letter-spacing: 2px;
            z-index: 3;
        }

        .brand .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--teal), #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand .tag {
            font-size: 10px;
            color: var(--slate);
            letter-spacing: 3px;
            margin-top: 2px;
        }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-140%);
            background: rgba(255,107,107,0.14);
            border: 1px solid var(--coral);
            color: var(--coral);
            padding: 11px 20px;
            border-radius: 8px;
            font-size: 12.5px;
            z-index: 10;
            transition: transform .35s ease;
            white-space: nowrap;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .alert {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-danger {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.2);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(100, 255, 218, 0.1);
            border: 1px solid rgba(100, 255, 218, 0.2);
            color: var(--teal);
        }

        .alert-warning {
            background: rgba(234, 179, 8, 0.1);
            border: 1px solid rgba(234, 179, 8, 0.2);
            color: #fde047;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <canvas id="sky"></canvas>
    <div class="veil"></div>
    <div id="toast"></div>

    <div class="page">
        <div class="brand">
            <a href="{{ url_for('main.index') }}" style="text-decoration: none;">
                <div class="logo">HuTech</div>
            </a>
            <div class="tag">CONNECT · BUILD · SHARE</div>
        </div>
        {% block content %}{% endblock %}
    </div>

    <!-- Fond animé commun -->
    <script>
        const canvas = document.getElementById('sky');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const STAR_COUNT = 160;
        const stars = [];
        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 1.3 + 0.3,
                vx: (Math.random() - 0.5) * 0.06,
                vy: (Math.random() - 0.5) * 0.06,
                baseAlpha: Math.random() * 0.5 + 0.3,
                tw: Math.random() * Math.PI * 2,
                twSpeed: Math.random() * 0.015 + 0.005
            });
        }

        function makeOrbit(rx, ry, tilt, speed, count, hue) {
            const particles = [];
            for (let i = 0; i < count; i++) {
                particles.push({ phase: (Math.PI * 2 / count) * i, size: Math.random() * 1.8 + 1.6 });
            }
            return { rx, ry, tilt, speed, angle: Math.random() * Math.PI * 2, particles, hue };
        }

        let orbits = [];
        function buildOrbits() {
            const cx = W / 2, cy = H * 0.40;
            const scale = Math.min(W, H) * 0.16;
            orbits = [
                { ...makeOrbit(scale * 2.1, scale * 0.65, 0.35, 0.00045, 5, 'teal') },
                { ...makeOrbit(scale * 2.1, scale * 0.65, -0.9, 0.00038, 5, 'violet') },
                { ...makeOrbit(scale * 2.1, scale * 0.65, -2.15, 0.00052, 5, 'teal') }
            ];
            orbits.center = { x: cx, y: cy };
        }
        buildOrbits();
        window.addEventListener('resize', buildOrbits);

        function drawOrbitPath(cx, cy, rx, ry, tilt) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(tilt);
            ctx.beginPath();
            ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(100,255,218,0.10)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        }

        function drawGlowDot(x, y, r, color) {
            const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 5);
            grad.addColorStop(0, color + 'ff');
            grad.addColorStop(0.35, color + '88');
            grad.addColorStop(1, color + '00');
            ctx.beginPath();
            ctx.fillStyle = grad;
            ctx.arc(x, y, r * 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.fillStyle = '#F8FAFC';
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
        }

        function tick() {
            ctx.clearRect(0, 0, W, H);
            const g = ctx.createLinearGradient(0, 0, 0, H);
            g.addColorStop(0, '#0A192F');
            g.addColorStop(1, '#081426');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);

            for (const s of stars) {
                s.x += s.vx; s.y += s.vy;
                if (s.x < 0) s.x = W; if (s.x > W) s.x = 0;
                if (s.y < 0) s.y = H; if (s.y > H) s.y = 0;
                s.tw += s.twSpeed;
                const alpha = s.baseAlpha + Math.sin(s.tw) * 0.25;
                ctx.beginPath();
                ctx.fillStyle = `rgba(248,250,252,${Math.max(0, alpha)})`;
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            }

            const { x: cx, y: cy } = orbits.center;
            const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 70);
            coreGrad.addColorStop(0, 'rgba(248,250,252,0.9)');
            coreGrad.addColorStop(0.25, 'rgba(100,255,218,0.55)');
            coreGrad.addColorStop(1, 'rgba(100,255,218,0)');
            ctx.beginPath();
            ctx.fillStyle = coreGrad;
            ctx.arc(cx, cy, 70, 0, Math.PI * 2);
            ctx.fill();

            for (const orb of orbits) {
                orb.angle += orb.speed;
                drawOrbitPath(cx, cy, orb.rx, orb.ry, orb.tilt);
                for (const p of orb.particles) {
                    const t = orb.angle + p.phase;
                    const ex = Math.cos(t) * orb.rx;
                    const ey = Math.sin(t) * orb.ry;
                    const rx2 = ex * Math.cos(orb.tilt) - ey * Math.sin(orb.tilt);
                    const ry2 = ex * Math.sin(orb.tilt) + ey * Math.cos(orb.tilt);
                    const color = orb.hue === 'teal' ? '#64FFDA' : '#a78bfa';
                    drawGlowDot(cx + rx2, cy + ry2, p.size, color);
                }
            }
            requestAnimationFrame(tick);
        }
        tick();

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2600);
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
